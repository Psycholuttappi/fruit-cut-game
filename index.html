<!DOCTYPE html>
<html>
<head>
<title>Fruit Cut Game</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:#111;
  color:white;
  font-family:sans-serif;
}
#score{
  position:absolute;
  top:10px;
  left:10px;
  font-size:24px;
}
.fruit{
  position:absolute;
  font-size:45px;
  cursor:pointer;
  transition: transform 0.2s;
}
.fruit:active{
  transform: scale(1.3);
}
</style>
</head>
<body>

<div id="score">Score: 0</div>

<script>
let score = 0;

function spawnFruit(){

  const fruit = document.createElement("div");
  fruit.className = "fruit";

  const fruits = ["🍎","🍉","🍌","🍓","🥕","🥑"];
  fruit.innerText = fruits[Math.floor(Math.random()*fruits.length)];

  fruit.style.left = Math.random()*window.innerWidth + "px";
  fruit.style.top = window.innerHeight + "px";

  document.body.appendChild(fruit);
